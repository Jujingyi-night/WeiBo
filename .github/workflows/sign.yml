name: 微博超话自动打卡

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # 北京时间早上 8 点运行

jobs:
  run-sign:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: 安装依赖库
        run: pip install requests
        
      - name: 执行签到脚本
        env:
          WEIBO_COOKIE: ${{ secrets.WEIBO_COOKIE }}
        run: python wb.py > result.log 2>&1
        
      - name: 发送微信通知
        if: always()
        run: |
          # 读取运行日志的内容
          CONTENT=$(cat result.log)
          
          # 智能判断结果，动态修改微信外面显示的标题
          if grep -q "成功" result.log; then
            TITLE="✅ 微博超话签到成功"
          else
            TITLE="❌ 微博打卡异常(可能Cookie已过期)"
          fi
          
          # 安全地把内容打包发给 PushPlus
          jq -n \
            --arg token "${{ secrets.PUSHPLUS_TOKEN }}" \
            --arg title "$TITLE" \
            --arg content "$CONTENT" \
            '{token: $token, title: $title, content: $content, template: "txt"}' \
            > payload.json
            
          curl -X POST "http://www.pushplus.plus/send" \
               -H "Content-Type: application/json" \
               -d @payload.json
