name: 微博超话自动打卡

on:
  workflow_dispatch: # 支持手动点击运行测试
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 时间 0 点（北京时间早上 8 点）自动运行

jobs:
  run-sign:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
      
      - name: 配置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          
      - name: 安装依赖库
        run: pip install requests
        
      - name: 执行签到脚本
        env:
          WEIBO_COOKIE: ${{ secrets.WEIBO_COOKIE }} # 这里读取你配置的 Secret
        run: python wb.py
